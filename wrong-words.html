<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错题本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            overflow: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .back-button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 18px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #5568d3;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .username {
            color: #333;
            font-size: 14px;
        }

        .logout-button {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 15px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-button:hover {
            background: #c0392b;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            align-items: center;
            flex-shrink: 0;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-label {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
        }

        .control-input {
            padding: 6px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .control-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .select-box {
            padding: 6px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background: white;
            min-width: 110px;
        }

        .select-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 18px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-button:hover {
            background: #5568d3;
        }

        #wordsContainer {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .words-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        .words-table th {
            background: #f5f5f5;
            padding: 8px 10px;
            text-align: left;
            font-weight: bold;
            color: #333;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 15px;
        }

        .words-table td {
            padding: 7px 10px;
            border-bottom: 1px solid #f0f0f0;
            line-height: 1.5;
        }

        .words-table tr:hover {
            background: #f9f9f9;
        }

        .words-table a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .words-table a:hover {
            color: #5568d3;
            text-decoration: underline;
        }

        .remove-button {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 12px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .remove-button:hover {
            background: #c0392b;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            flex-shrink: 0;
            padding-top: 8px;
            border-top: 1px solid #e0e0e0;
        }

        .page-button {
            padding: 6px 10px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .page-button:hover:not(:disabled) {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .page-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .page-input {
            width: 55px;
            padding: 5px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .page-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .page-info {
            color: #666;
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
        }

        .no-results {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 14px;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 200px;
        }

        .search-input-wrapper {
            position: relative;
            width: 100%;
        }

        .clear-button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            width: 20px;
            height: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
        }

        .clear-button:hover {
            color: #667eea;
        }

        .clear-button.visible {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <button class="back-button" onclick="goBack()">← 返回</button>
                <div class="title" id="pageTitle">错题本</div>
            </div>
            <div class="user-info">
                <span class="username" id="usernameDisplay"></span>
                <button class="logout-button" onclick="handleLogout()">登出</button>
            </div>
        </div>

        <div class="controls">
            <div class="control-item">
                <label class="control-label">排序：</label>
                <select class="select-box" id="sortSelect">
                    <option value="az">A-Z</option>
                    <option value="za">Z-A</option>
                </select>
            </div>

            <div class="control-item">
                <label class="control-label">词性：</label>
                <select class="select-box" id="posFilterSelect">
                    <option value="all">全部</option>
                </select>
            </div>

            <div class="control-item search-wrapper">
                <div class="search-input-wrapper">
                    <input type="text" class="control-input" id="searchInput" placeholder="搜索单词..." 
                           style="width: 100%; padding-right: 30px;" 
                           onkeypress="if(event.key==='Enter') applyFilters()"
                           oninput="toggleClearButton()">
                    <button class="clear-button" id="clearButton" onclick="clearSearch()" title="清空搜索">×</button>
                </div>
            </div>

            <button class="search-button" onclick="applyFilters()">查询</button>
        </div>

        <div id="wordsContainer">
            <div class="loading">加载中...</div>
        </div>

        <div class="pagination" id="pagination" style="display: none;">
            <!-- 分页器将动态生成 -->
        </div>
    </div>

    <script src="js/user-manager.js"></script>
    <script src="js/vocabulary-data.js"></script>
    <script src="js/storage-manager.js"></script>
    <script src="js/llm-api.js"></script>
    <script src="js/translation-helper.js?v=2"></script>
    <script src="js/wrong-words-controller.js"></script>
    <script>
        // 检查登录状态
        if (!userManager.isLoggedIn()) {
            window.location.href = 'login.html';
        } else {
            // 显示用户名
            const username = userManager.getCurrentUser();
            document.getElementById('usernameDisplay').textContent = `用户：${username}`;
        }

        // 登出功能
        function handleLogout() {
            if (confirm('确定要登出吗？')) {
                userManager.logout();
                window.location.href = 'login.html';
            }
        }
    </script>
    <script>
        // 切换清除按钮显示
        function toggleClearButton() {
            const searchInput = document.getElementById('searchInput');
            const clearButton = document.getElementById('clearButton');
            if (searchInput && clearButton) {
                if (searchInput.value.trim()) {
                    clearButton.classList.add('visible');
                } else {
                    clearButton.classList.remove('visible');
                }
            }
        }

        // 清空搜索
        function clearSearch() {
            const searchInput = document.getElementById('searchInput');
            const clearButton = document.getElementById('clearButton');
            if (searchInput) {
                searchInput.value = '';
                if (clearButton) {
                    clearButton.classList.remove('visible');
                }
                if (typeof wrongWordsController !== 'undefined') {
                    wrongWordsController.applyFilters();
                }
            }
        }
    </script>
</body>
</html>
